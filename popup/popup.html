<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="lang-switch" id="langSwitch">
    <button type="button" data-lang="en" class="lang">EN</button>
    <button type="button" data-lang="zh" class="lang">中文</button>
  </div>

  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">—</span>
  </div>
  <div class="meta" id="meta">—</div>

  <div class="actions">
    <button id="openOptionsBtn" class="btn" data-i18n="pop.options">Settings</button>
    <button id="openConsoleBtn" class="btn" data-i18n="pop.console">MCP Console</button>
  </div>

  <div class="divider"></div>

  <div class="quick-search">
    <input type="text" id="searchInput" placeholder="search…" data-i18n-placeholder="pop.placeholder" />
    <button id="searchBtn" class="btn primary" data-i18n="pop.search">Search</button>
  </div>
  <pre class="output" id="output" hidden></pre>

  <script type="module" src="popup.js"></script>
</body>
</html>
