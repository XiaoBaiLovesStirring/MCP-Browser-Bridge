<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP-Browser-Bridge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header>
      <img src="../icons/icon48.png" alt="" class="logo" />
      <div>
        <div class="title">MCP-Browser-Bridge</div>
        <div class="status" id="statusText">Checking…</div>
      </div>
      <span class="dot" id="statusDot"></span>
    </header>

    <div class="endpoint" id="endpoint">—</div>

    <div class="actions">
      <button id="reconnectBtn" class="btn primary">Reconnect</button>
      <button id="optionsBtn" class="btn">Settings</button>
    </div>

    <div class="section">
      <div class="section-title">Quick test</div>
      <div class="row">
        <input type="text" id="queryInput" placeholder="Search query…" />
        <button id="searchBtn" class="btn small primary">Search</button>
      </div>
      <pre id="testOutput" class="output" hidden></pre>
    </div>

    <div class="section">
      <div class="section-title">Current tab</div>
      <button id="extractBtn" class="btn">Extract current page</button>
      <pre id="extractOutput" class="output" hidden></pre>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
