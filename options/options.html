<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP-Browser-Bridge · Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="../icons/icon48.png" alt="" class="brand-icon" />
      <div>
        <h1>MCP-Browser-Bridge</h1>
        <p class="subtitle">Configure search engines and extraction behavior. Pure browser extension, no setup required.</p>
      </div>
    </div>
    <button id="openConsole" class="btn primary">Open MCP Console</button>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Behavior</h2>
      <div class="grid two">
        <label class="field">
          <span>Tab lifecycle after extraction</span>
          <select id="tabLifecycle">
            <option value="close">Close tab (recommended)</option>
            <option value="keep">Keep tab open</option>
          </select>
        </label>
        <label class="field">
          <span>Max results per search</span>
          <input type="number" id="maxResults" min="1" max="100" />
        </label>
      </div>
      <div class="grid two">
        <label class="field">
          <span>Page load timeout (ms)</span>
          <input type="number" id="pageLoadTimeoutMs" min="2000" max="60000" step="500" />
        </label>
        <div class="field">
          <span>&nbsp;</span>
          <button id="saveBehaviorBtn" class="btn primary">Save</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Search engines</h2>
        <button id="addEngineBtn" class="btn primary small">+ Add engine</button>
      </div>
      <p class="hint">Use <code>{query}</code> as the query placeholder in the URL template.</p>
      <div id="engineList" class="engine-list"></div>
      <div class="actions">
        <button id="resetEnginesBtn" class="btn ghost">Reset to defaults</button>
        <button id="saveEnginesBtn" class="btn primary">Save engines</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
      <h3 id="modalTitle">Add engine</h3>
      <label class="field">
        <span>Name</span>
        <input type="text" id="engName" placeholder="Google" />
      </label>
      <label class="field">
        <span>URL template <small class="muted">(must contain {query})</small></span>
        <input type="text" id="engUrl" placeholder="https://www.google.com/search?q={query}" />
      </label>
      <div class="grid two">
        <label class="field">
          <span>Result selector <small class="muted">(CSS)</small></span>
          <input type="text" id="engResult" placeholder="div.g" />
        </label>
        <label class="field">
          <span>Link selector</span>
          <input type="text" id="engLink" placeholder="a" />
        </label>
      </div>
      <div class="grid two">
        <label class="field">
          <span>Title selector</span>
          <input type="text" id="engTitle" placeholder="h3" />
        </label>
        <label class="field">
          <span>Snippet selector</span>
          <input type="text" id="engSnippet" placeholder="div[data-sncf]" />
        </label>
      </div>
      <label class="field checkbox">
        <input type="checkbox" id="engEnabled" />
        <span>Enabled</span>
      </label>
      <div class="actions">
        <button id="modalCancel" class="btn ghost">Cancel</button>
        <button id="modalSave" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script type="module" src="options.js"></script>
</body>
</html>
